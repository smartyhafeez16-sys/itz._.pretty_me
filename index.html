<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(#ff9ecf,#ffe6f2);
    font-family: Arial, sans-serif;
    overflow:hidden;
    transition:1s;
}

/* CENTER TEXT */
.start{
    font-size:30px;
    color:#ff1493;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}

/* IMAGE */
img{
    width:280px;
    border-radius:20px;
    opacity:0;
    transform:scale(0.8);
    transition:1s;
}
.show{
    opacity:1;
    transform:scale(1);
}

/* MESSAGE */
.message{
    position:fixed;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.5);
    color:white;
    padding:12px 20px;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-20px;
    animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div id="start" class="start">
Do you wanna see the Prettiest of all time? 💖
</div>

<img id="photo" class="hidden">
<div id="msg" class="message" style="display:none;"></div>

<script>

const start = document.getElementById('start');
const photo = document.getElementById('photo');
const msg = document.getElementById('msg');

let step = 0;

// 💬 Compliments (blush guaranteed 😏)
const texts = [
"OMG… those bangles 😳💖",
"Ohhh the cutenesssss 😩✨",
"Wao wao… the prettiest girl omg 😍🔥",
"This beauty ? Illegal 😤❤️",
"HOW ARE YOU THIS PERFECT 😳💫",
"You getting prettier and prettier every second 💖",
" wao wao wao I'm Blushing 😍",
"I'm Speecheless 😶‍🌫️💘",
"There is No Competition 🥺❤️"
];

// 📸 Images
const images = [
"18.png","19.png","20.png","21.png","22.png",
"23.png","24.png","25.png","26.png"
];

// ❤️ floating hearts
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤";
 h.style.left=Math.random()*100+"vw";
 h.style.color="#ff4d88";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},300);

// ✨ typing effect
function typeText(text){
 msg.style.display="block";
 msg.innerHTML="";
 let i=0;

 let interval=setInterval(()=>{
  msg.innerHTML += text.charAt(i);
  i++;
  if(i>=text.length){
    clearInterval(interval);
  }
 },40);
}

// 🚀 START
start.onclick = ()=>{
 start.style.display="none";
 showNext();
};

// 📸 NEXT IMAGE
document.body.onclick = ()=>{
 if(start.style.display==="none"){
   showNext();
 }
};

function showNext(){

 if(step >= images.length){
   typeText("Okay… itnaaa pyari  😩💖");
   return;
 }

 photo.src = images[step];
 photo.classList.add("show");

 typeText(texts[step]);

 step++;
}

</script>

</body>
</html>
