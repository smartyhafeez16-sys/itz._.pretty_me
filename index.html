<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(#ff9ecf,#ffe6f2);
    font-family: Arial, sans-serif;
    overflow:hidden;
    transition:1s;
}

/* START TEXT */
.start{
    font-size:26px;
    color:#ff1493;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    padding:20px;
}

/* IMAGE */
img{
    width:80%;
    max-width:300px;
    border-radius:20px;
    opacity:0;
    transform:scale(0.8);
    transition:1s;
}
.show{
    opacity:1;
    transform:scale(1);
}

/* MESSAGE */
.message{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.5);
    color:white;
    padding:10px 18px;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    text-align:center;
    width:90%;
    max-width:350px;
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-20px;
    animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div id="start" class="start">
Do you wanna see the Prettiest of all time? 💖
</div>

<img id="photo">
<div id="msg" class="message" style="display:none;"></div>

<script>

const start = document.getElementById('start');
const photo = document.getElementById('photo');
const msg = document.getElementById('msg');

let step = 0;
let started = false;

// TEXTS
const texts = [
"OMG… those bangles 😳💖",
"Ohhh the cuteness ... I cant 😩✨",
"Wao wao the prettiest 😍🔥",
"This Beauty? illegal  😤❤️",
"OMggg this perfect 😳💫",
"You getting prettier every second 💖",
"This one 😍",
"I am Actually speechless Now 😶‍🌫️💘",
"Prettiest of all time Literally 🥺❤️"
];

// IMAGES
const images = [
"18.png","19.png","20.png","21.png","22.png",
"23.png","24.png","25.png","26.png"
];

// HEARTS
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤";
 h.style.left=Math.random()*100+"vw";
 h.style.color="#ff4d88";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},300);

// TEXT EFFECT
function typeText(text){
 msg.style.display="block";
 msg.innerHTML="";
 let i=0;

 let interval=setInterval(()=>{
  msg.innerHTML += text.charAt(i);
  i++;
  if(i>=text.length){
    clearInterval(interval);
  }
 },35);
}

// START CLICK (MOBILE + PC)
function startFlow(){
 if(started) return;
 started = true;
 start.style.display="none";
 showNext();
}

// NEXT STEP
function showNext(){

 if(step >= images.length){
   typeText("Even the moon blushes when it sees you 🌙💖");
   document.removeEventListener("click", handleClick);
   document.removeEventListener("touchstart", handleClick);
   return;
 }

 photo.classList.remove("show");

 setTimeout(()=>{
   photo.src = images[step];
   photo.classList.add("show");
   typeText(texts[step]);
   step++;
 },200);
}

// UNIVERSAL CLICK HANDLER
function handleClick(){
 if(!started){
   startFlow();
 } else {
   showNext();
 }
}

// EVENTS (PC + MOBILE)
document.addEventListener("click", handleClick);
document.addEventListener("touchstart", handleClick);

</script>

</body>
</html>
